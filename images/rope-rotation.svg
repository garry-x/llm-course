<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" fill="none">
  <defs>
    <style>

      text{font-family:system-ui,-apple-system,sans-serif}
      .bg{fill:#fbf9f5}
      .box{fill:#fff;stroke:#d4cec4;stroke-width:1.5}
      .b2{fill:#fdf5ed;stroke:#b35c22;stroke-width:2}
      .t1{fill:#5c554a;font-size:13px}
      .t2{fill:#1c1c1c;font-size:15px;font-weight:700}
      .t3{fill:#b35c22;font-size:13px;font-family:'JetBrains Mono','Fira Code',monospace}
      .ts{fill:#9e968a;font-size:11px}
      .arr{stroke:#b35c22;stroke-width:2;fill:none;marker-end:url(#ah)}
      .rot{stroke:#b35c22;stroke-width:1.5;stroke-dasharray:4 3;fill:none}
    
    </style>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#b35c22"/></marker>
  </defs>
  <rect class="bg" width="900" height="650"/>

  <text class="t2" x="450" y="30" text-anchor="middle" style="font-size:18px">RoPE Rotary Position Encoding — How It Works</text>

  <!-- Left: 2D rotation visualization -->
  <rect class="box" x="30" y="50" width="410" height="270"/>
  <text class="t2" x="235" y="75" text-anchor="middle">2D Rotation Illustration (per pair of dimensions)</text>

  <!-- Coordinate axes -->
  <line x1="60" y1="230" x2="380" y2="230" stroke="#d4cec4" stroke-width="1"/>
  <line x1="220" y1="70" x2="220" y2="280" stroke="#d4cec4" stroke-width="1"/>
  <!-- Arrow from origin to point -->
  <line x1="220" y1="230" x2="340" y2="140" stroke="#b35c22" stroke-width="2.5" marker-end="url(#ah)"/>
  <text class="t2" x="345" y="135" text-anchor="start">(q₀, q₁)</text>
  <!-- Dashed rotation arc -->
  <path class="rot" d="M 300 195 A 80 80 0 0 0 350 165"/>
  <text class="t3" x="330" y="195" text-anchor="start">θ = pos × ω</text>

  <text class="t1" x="235" y="110" text-anchor="middle">Rotation Angle = Position m × Frequency θ_i</text>
  <text class="t3" x="235" y="130" text-anchor="middle">θ_i = 10000^(-2i/d)</text>
  <text class="ts" x="235" y="148" text-anchor="middle">Low-frequency dimensions (small i): slow rotation, encode long-range positions</text>
  <text class="ts" x="235" y="163" text-anchor="middle">High-frequency dimensions (large i): fast rotation, encode short-range positions</text>

  <!-- Frequency spectrum -->
  <g transform="translate(70,265)">
    <text class="ts" x="0" y="0" text-anchor="middle">i=0</text>
    <text class="ts" x="70" y="0" text-anchor="middle">i=16</text>
    <text class="ts" x="140" y="0" text-anchor="middle">i=32</text>
    <text class="ts" x="210" y="0" text-anchor="middle">i=48</text>
    <text class="ts" x="280" y="0" text-anchor="middle">i=63</text>
    <text class="ts" x="140" y="15" text-anchor="middle">← Low frequency (slow rotation) —————————— High frequency (fast rotation) →</text>
  </g>

  <!-- Right: Key property -->
  <rect class="b2" x="460" y="50" width="410" height="270"/>
  <text class="t2" x="665" y="75" text-anchor="middle">Core Properties of RoPE</text>

  <text class="t1" x="480" y="105" text-anchor="start" style="font-weight:600">1. Relative Position Encoding</text>
  <text class="t1" x="480" y="125" text-anchor="start" style="font-size:12px">Dot product of rotated Q and K:</text>
  <text class="t3" x="665" y="150" text-anchor="middle">(R_m · q)^T · (R_n · k) = q^T · R_{n-m} · k</text>
  <text class="t1" x="480" y="175" text-anchor="start" style="font-size:12px">The result depends only on the relative position (m-n), not the absolute position</text>

  <text class="t1" x="480" y="205" text-anchor="start" style="font-weight:600">2. Norm Preservation</text>
  <text class="t1" x="480" y="225" text-anchor="start" style="font-size:12px">Rotation does not change vector length: ||R·q|| = ||q||</text>
  <text class="t1" x="480" y="245" text-anchor="start" style="font-size:12px">Ensures that the semantic information of Token Embedding is not corrupted by position encoding</text>

  <text class="t1" x="480" y="275" text-anchor="start" style="font-weight:600">3. Long Sequence Extrapolation</text>
  <text class="t1" x="480" y="295" text-anchor="start" style="font-size:12px">By scaling the frequency θ_i (NTK-aware), a model trained on a</text>
  <text class="t1" x="480" y="310" text-anchor="start" style="font-size:12px">certain length can be extended to 8× or even 32× the context length without retraining</text>

  <!-- Bottom: Implementation -->
  <rect class="box" x="30" y="340" width="840" height="125"/>
  <text class="t2" x="450" y="365" text-anchor="middle">Implementation Details</text>

  <g font-family="'JetBrains Mono','Fira Code',monospace" font-size="12">
    <text class="t3" x="50" y="390" text-anchor="start">def apply_rope(q, k, pos):</text>
    <text class="t1" x="70" y="410" text-anchor="start">freqs = 1.0 / (10000 ** (torch.arange(0, d, 2) / d))   # frequency sequence</text>
    <text class="t1" x="70" y="428" text-anchor="start">angles = pos[:, None] * freqs[None, :]                 # position × frequency = rotation angle</text>
    <text class="t1" x="70" y="446" text-anchor="start">q_rot = q * cos(angles) + rotate_half(q) * sin(angles) # apply rotation to each pair of dimensions</text>
    <text class="t1" x="70" y="456" text-anchor="start">k_rot = k * cos(angles) + rotate_half(k) * sin(angles)</text>
  </g>

  <!-- Bottom: comparison table -->
  <rect class="box" x="30" y="490" width="840" height="130"/>
  <text class="t2" x="450" y="515" text-anchor="middle">Position Encoding Scheme Comparison</text>
  <g font-size="12">
    <text class="t1" x="50" y="540" text-anchor="start" style="font-weight:700">Sinusoidal</text>
    <text class="t1" x="170" y="540" text-anchor="start">Additive injection, fixed and non-learnable</text>
    <text class="ts" x="450" y="540" text-anchor="start">Usually requires combination with Learned PE</text>

    <text class="t1" x="50" y="560" text-anchor="start" style="font-weight:700">Learned PE</text>
    <text class="t1" x="170" y="560" text-anchor="start">Learnable absolute position, used by GPT-2/3</text>
    <text class="ts" x="450" y="560" text-anchor="start">Cannot extrapolate, requires interpolation</text>

    <text class="t1" x="50" y="580" text-anchor="start" style="font-weight:700;fill:#b35c22">RoPE (Recommended)</text>
    <text class="t1" x="170" y="580" text-anchor="start" style="fill:#b35c22">Rotary encoding, used by Llama/Qwen/DeepSeek</text>
    <text class="ts" x="450" y="580" text-anchor="start">Naturally supports extrapolation, relative positions, norm preservation</text>

    <text class="t1" x="50" y="600" text-anchor="start" style="font-weight:700">ALiBi</text>
    <text class="t1" x="170" y="600" text-anchor="start">Linear bias, used by BLOOM/MPT</text>
    <text class="ts" x="450" y="600" text-anchor="start">Excellent extrapolation ability, but limited expressiveness</text>
  </g>
</svg>