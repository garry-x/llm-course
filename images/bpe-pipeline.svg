<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" fill="none">
  <defs>
    <style>
      text{font-family:system-ui,sans-serif}
      .bg{fill:#fbf9f5}
      .box{fill:#fff;stroke:#d4cec4;stroke-width:1.5}
      .box-a{fill:#fdf5ed;stroke:#b35c22;stroke-width:2}
      .arrow{stroke:#b35c22;stroke-width:2;fill:none;marker-end:url(#ah)}
      .loop{stroke:#9e968a;stroke-width:1.5;fill:none;stroke-dasharray:5 4;marker-end:url(#ahl)}
      .label{fill:#5c554a;font-size:13px;text-anchor:middle}
      .title{fill:#1c1c1c;font-size:15px;font-weight:700;text-anchor:middle}
      .code{fill:#b35c22;font-size:12px;font-family:monospace;text-anchor:middle}
      @media(prefers-color-scheme:dark){
        .bg{fill:#1a1814}
        .box{fill:#24221d;stroke:#504a40}
        .box-a{fill:#2a2018;stroke:#e08940}
        .label{fill:#a09888}
        .title{fill:#ede8df}
        .code{fill:#e08940}
        .loop{stroke:#8a8278}
      }
    </style>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#b35c22"/></marker>
    <marker id="ahl" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#9e968a"/></marker>
  </defs>
  <rect class="bg" width="900" height="480"/>

  <!-- Title -->
  <text class="title" x="450" y="30" style="font-size:18px">BPE 训练流程</text>

  <!-- Step 1 -->
  <rect class="box-a" x="40" y="55" width="200" height="65"/>
  <text class="title" x="140" y="78">1. 初始化</text>
  <text class="label" x="140" y="95">UTF-8 编码文本</text>
  <text class="code" x="140" y="112">ids = text.encode('utf-8')</text>

  <line class="arrow" x1="240" y1="88" x2="290" y2="88"/>

  <!-- Step 2 -->
  <rect class="box" x="295" y="55" width="200" height="65"/>
  <text class="title" x="395" y="78">2. 统计 pair 频率</text>
  <text class="label" x="395" y="95">滑动窗口统计相邻对</text>
  <text class="code" x="395" y="112">Counter(zip(ids,ids[1:]))</text>

  <line class="arrow" x1="495" y1="88" x2="545" y2="88"/>

  <!-- Step 3 -->
  <rect class="box" x="550" y="55" width="200" height="65"/>
  <text class="title" x="650" y="78">3. 合并最高频对</text>
  <text class="label" x="650" y="95">替换所有 (a,b) → new_id</text>
  <text class="code" x="650" y="112">ids = merge(ids, top_pair)</text>

  <!-- Loop back -->
  <path class="loop" d="M 650 120 Q 650 170 450 170 Q 140 170 140 120"/>
  <text class="label" x="400" y="165">重复 V-256 次 (如 GPT-2: 50000次)</text>

  <!-- Step 4 -->
  <rect class="box" x="40" y="195" width="200" height="55"/>
  <text class="title" x="140" y="218">4. 保存词表 + 合并规则</text>
  <text class="code" x="140" y="240">vocab: {id→bytes}</text>

  <line class="arrow" x1="240" y1="225" x2="300" y2="225"/>

  <!-- Encoding -->
  <rect class="box-a" x="305" y="195" width="250" height="55"/>
  <text class="title" x="430" y="218">5. Encode (文本→token序列)</text>
  <text class="code" x="430" y="240">贪心最长匹配 → list[int]</text>

  <line class="arrow" x1="555" y1="225" x2="615" y2="225"/>

  <!-- Decoding -->
  <rect class="box" x="620" y="195" width="250" height="55"/>
  <text class="title" x="745" y="218">6. Decode (token→文本)</text>
  <text class="code" x="745" y="240">id→bytes 拼接 → UTF-8 解码</text>

  <!-- Example -->
  <rect class="box" x="40" y="290" width="830" height="170"/>
  <text class="title" x="450" y="315" style="font-size:16px">完整示例: "low lower lowest" → 目标词表大小 V=300</text>

  <text class="code" x="50" y="345" text-anchor="start">初始:    l, o, w, _, l, o, w, e, r, _, l, o, w, e, s, t    (16 字节)</text>
  <text class="code" x="50" y="370" text-anchor="start">合并 #1:  lo, w, _, lo, w, e, r, _, lo, w, e, s, t          "l"+"o" (3次)</text>
  <text class="code" x="50" y="395" text-anchor="start">合并 #2:  low, _, low, e, r, _, low, e, s, t                "lo"+"w" (3次)</text>
  <text class="code" x="50" y="420" text-anchor="start">合并 #3:  low, _, low, er, _, low, e, s, t                  "e"+"r" (2次)</text>
  <text class="code" x="50" y="445" text-anchor="start">... 持续直到词表达到 300 个符号，序列长度从 16 → ~6</text>
</svg>
