<style>
/* ========== CSS Variables & Reset ========== */
:root {
  --bg: #f8f9fb;
  --surface: #ffffff;
  --text: #1a1a2e;
  --text-secondary: #5a5a7a;
  --primary: #4f46e5;

  --primary-light: #eef2ff;

  --focus-ring: #4f46e5;
  --success: #059669;
  --border: #e2e4e9;
  --code-bg: #1e1e2e;
  --code-text: #cdd6f4;
  --sidebar-bg: #0f0f1a;

body {

}

.code-block {

[data-theme="dark"] .info-box.tip { background: #0d1f17; border-color: #1a4a2e; color: #7ee787; }

.info-box .icon { font-size: 1.2rem; flex-shrink: 0; }

/* ========== Exercise ========== */

.exercise h4 { font-size: 1rem; font-weight: 700; margin-bottom: 12px; color: var(--accent); }
.exercise .q { margin-bottom: 16px; }
.exercise .q p { margin-bottom: 8px; }
.exercise textarea, .exercise input[type="text"] {

.exercise textarea:focus-visible, .exercise input:focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 1px; border-color: var(--primary); }
.exercise .opts { display: flex; flex-direction: column; gap: 6px; }
.exercise .opts label {

.exercise .opts label:hover { background: var(--primary-light); }
.exercise .opts input[type="radio"] { accent-color: var(--primary); }
.btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px;
  border: none; border-radius: var(--radius-sm); font-size: .88rem; font-weight: 600;
  cursor: pointer; transition: all var(--transition);
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-primary:focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 2px; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-outline:focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 2px; }
.btn:focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 2px; }
.feedback { margin-top: 12px; padding: 10px 14px; border-radius: var(--radius-sm); font-size: .88rem; display: none; }
.feedback.show { display: block; }
.feedback.correct { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
.feedback.incorrect { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
[data-theme="dark"] .feedback.correct { background: #0d1f17; border-color: #1a4a2e; color: #7ee787; }
[data-theme="dark"] .feedback.incorrect { background: #1f0d0d; border-color: #4a1a1a; color: #f07070; }

/* ========== Chapter Nav ========== */
.chapter-nav { display: flex; justify-content: space-between; margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); }
.chapter-nav .btn { padding: 10px 20px; }

/* ========== Table ========== */
.table-wrap { overflow-x: auto; margin: 12px 0; }
table { width: 100%; border-collapse: collapse; font-size: .88rem; }
th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); }
th { font-weight: 700; color: var(--text); background: var(--table-stripe); }
td { color: var(--text-secondary); }

/* ========== Mobile ========== */
.menu-toggle {
  display: none; position: fixed; top: 16px; left: 16px; z-index: 200;
  width: 40px; height: 40px; border-radius: 50%; background: var(--primary);

}
@media (max-width: 800px) {
  .sidebar { transform: translateX(-100%); }

  .chapter h2 { font-size: 1.5rem; }
  .card { padding: 20px 16px; }
}

/* ========== Print ========== */
@media print {
  .sidebar, .menu-toggle, .chapter-nav { display: none; }
  .main { margin-left: 0; }
  .chapter { display: block !important; page-break-after: always; }

/* Diagram styles */
.diagram {

  padding: 24px; margin: 16px 0; text-align: center; font-family: monospace;
  font-size: .82rem; line-height: 1.8; overflow-x: auto; white-space: pre;
  color: var(--text-secondary);
}

/* ========== Theme Toggle ========== */
.theme-toggle {
  display: flex; align-items: center; gap: 8px; padding: 8px 16px;
  margin: 0 12px 12px; font-size: .8rem; color: var(--sidebar-text);
  background: rgba(255,255,255,.05); border: none; border-radius: var(--radius-sm);
  cursor: pointer; transition: all var(--transition); width: calc(100% - 24px);
  font-family: inherit;
}
.theme-toggle:hover { background: rgba(255,255,255,.1); color: #fff; }
.theme-toggle:focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 2px; border-radius: 4px; }

/* ========== Back to Top ========== */
.back-to-top {
  position: fixed; bottom: 24px; right: 24px; z-index: 200;
  width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); font-size: 1.2rem;
  cursor: pointer; box-shadow: var(--shadow-lg); opacity: 0; pointer-events: none;
  transition: opacity var(--transition); display: flex; align-items: center; justify-content: center;
}
.back-to-top.visible { opacity: 1; pointer-events: auto; }
.back-to-top:focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 2px; }

/* ========== Reset Button ========== */
.reset-progress {
  display: block; padding: 6px 16px; margin: 8px 16px; font-size: .72rem;
  color: var(--sidebar-text); background: transparent; border: 1px solid rgba(255,255,255,.1);
  border-radius: 4px; cursor: pointer; font-family: inherit; transition: all var(--transition);
}
.reset-progress:hover { border-color: rgba(255,255,255,.3); color: #fff; }

/* ========== Focus Global ========== */
a:focus-visible, button:focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 2px; }

/* ========== Screen Reader Only ========== */
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
</style>

<script>
// ==================== COURSE DATA ====================
const chapters = [
{
  id: 1,
  title: "认识大语言模型",
  subtitle: "了解 LLM 是什么、它为什么重要，以及它的发展脉络",
  sections: [
    {
      type: "card",
      title: "1.1 什么是大语言模型？",
      content: `
        <p>大语言模型（Large Language Model, LLM）是一类基于深度学习、使用海量文本数据训练而成的神经网络模型。它的核心能力是<strong>理解和生成人类语言</strong>——给定一段文本作为"提示"（prompt），模型能预测并生成最可能的后续文本。</p>
        <p>你可以把 LLM 想象成一个<strong>超级 autocomplete</strong>：它学习到了语言中词汇、语法、语义以及世界知识的统计规律，从而能完成翻译、摘要、问答、代码生成等复杂任务。</p>
        <div class="info-box key">
          <span class="icon">🔑</span>
          <div><strong>核心定义：</strong>LLM = 大规模参数化的语言概率模型。给定上下文 <span class="katex-inline" data-expr="x_{<t}"></span>，它估计下一个 token 的条件概率分布 <span class="katex-inline" data-expr="P(x_t \\mid x_{<t})"></span>。</div>
        </div>
        <h4>LLM 与传统 NLP 的区别</h4>
        <div class="table-wrap">
          <table>
            <tr><th>维度</th><th>传统 NLP</th><th>大语言模型</th></tr>
            <tr><td>方法</td><td>规则 + 特征工程 + 小模型</td><td>端到端深度学习</td></tr>
            <tr><td>训练数据</td><td>标注数据集（千～万级）</td><td>海量无标注文本（万亿 token 级）</td></tr>
            <tr><td>模型大小</td><td>百万参数</td><td>数十亿～数万亿参数</td></tr>
            <tr><td>泛化能力</td><td>单一任务</td><td>多任务，涌现能力</td></tr>
            <tr><td>开发流程</td><td>为每个任务单独建模</td><td>预训练 + 微调 / 提示</td></tr>
          </table>
        </div>
      `
    },
    {
      type: "card",
      title: "1.2 发展简史",
      content: `
        <div class="table-wrap">
          <table>
            <tr><th>年份</th><th>里程碑</th><th>关键创新</th></tr>
            <tr><td>2017</td><td>Transformer 论文</td><td>自注意力机制，抛弃 RNN</td></tr>
            <tr><td>2018</td><td>BERT / GPT-1</td><td>双向编码 / 自回归生成预训练</td></tr>
            <tr><td>2019</td><td>GPT-2 (1.5B)</td><td>zero-shot 能力初现，"too dangerous to release"</td></tr>
            <tr><td>2020</td><td>GPT-3 (175B)</td><td>few-shot in-context learning</td></tr>
            <tr><td>2022</td><td>ChatGPT / GPT-3.5</td><td>RLHF 对齐，对话式交互</td></tr>
            <tr><td>2023</td><td>GPT-4 / Llama 2</td><td>多模态、开源追赶闭源</td></tr>
            <tr><td>2024</td><td>Claude 3 / GPT-4o / Llama 3</td><td>多模态原生、实时语音、开源 SOTA</td></tr>
            <tr><td>2025</td><td>DeepSeek-R1 / Claude 4</td><td>推理时扩展、强化推理、agentic AI</td></tr>
          </table>
        </div>
      `
    },
    {
      type: "card",
      title: "1.3 为什么 LLM 能 work？——缩放定律",
      content: `
        <p>2020 年，OpenAI 的 Kaplan 等人发现了<strong>缩放定律（Scaling Laws）</strong>：模型的交叉熵损失 <span class="katex-inline" data-expr="L"></span> 随模型参数量 <span class="katex-inline" data-expr="N"></span>、训练数据量 <span class="katex-inline" data-expr="D"></span> 和计算量 <span class="katex-inline" data-expr="C"></span> 的增加呈幂律下降：</p>
        <div class="math-box">
          <div class="label">缩放定律</div>
          <div class="katex" data-expr="L(N) = \\left(\\frac{N_c}{N}\\right)^{\\alpha_N},\\quad L(D) = \\left(\\frac{D_c}{D}\\right)^{\\alpha_D}"></div>
        </div>
        <p>其中 <span class="katex-inline" data-expr="\\alpha_N \\approx 0.076,\\ \\alpha_D \\approx 0.095"></span>，<span class="katex-inline" data-expr="N_c, D_c"></span> 是常数。这意味着：<strong>更大的模型 + 更多的数据 = 更低的 loss = 更好的性能</strong>。</p>
        <p>2022 年 DeepMind 的 Chinchilla 论文进一步发现：最优训练效率下，<strong>token 数应该是参数量的约 20 倍</strong>（即 Chinchilla 最优）。这也解释了为什么 Llama 3 用 15T token 训练 405B 参数模型。</p>

        <p>BPE 是 GPT 系列最常用的分词算法。它是一种<strong>自底向上</strong>的压缩算法：从字符级开始，反复合并最频繁出现的相邻符号对。</p>

          <div class="katex" data-expr="g(\\mathbf{x}) = \\text{softmax}(\\text{TopK}(\\mathbf{x}\\mathbf{W}_{\\text{gate}}, k))"></div>

        <p><strong>典型 MoE 模型：</strong>Mixtral 8×7B（8 个专家，每次激活 2 个，总参数 46.7B，激活参数 12.9B），DeepSeek-V2（160+ 专家，细粒度 MoE）。</p>

        <div class="table-wrap">
          <table>
            <tr><th>方案</th><th>K/V 头数</th><th>KV Cache 大小</th><th>质量</th><th>代表模型</th></tr>
            <tr><td>MHA</td><td>= Q 头数</td><td>最大</td><td>最优</td><td>GPT-3, 原始 Transformer</td></tr>

// ==================== RENDER APP ====================
const sidebarNav = document.getElementById('sidebar-nav');
const mainContent = document.getElementById('main-content');
const progressBar = document.getElementById('progress-bar');
const progressText = document.getElementById('progress-text');

function safeGetJSON(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch(e) { return fallback; }
}
function safeSetJSON(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch(e) { /* quota exceeded or private mode */ }
}

let completedChapters = new Set(safeGetJSON('llm-course-completed', []));
let currentChapter = parseInt(safeGetJSON('llm-course-current', 1) || 1);

function saveState() {
  safeSetJSON('llm-course-completed', [...completedChapters]);
  safeSetJSON('llm-course-current', currentChapter);
}

function updateProgress() {
  const pct = (completedChapters.size / chapters.length) * 100;
  progressBar.style.width = pct + '%';
  progressText.textContent = completedChapters.size + ' / ' + chapters.length;
}

function renderSidebar() {
  sidebarNav.innerHTML = chapters.map(ch => {
    const isActive = ch.id === currentChapter;
    const cls = (isActive ? 'active' : '') + (completedChapters.has(ch.id) ? ' completed' : '');
    return `<a href="#ch${ch.id}" class="${cls}" ${isActive ? 'aria-current="page"' : ''} onclick="navigateTo(${ch.id})">
      <span class="ch-num">${ch.id}</span> ${ch.title}
    </a>`;
  }).join('');
}

function renderChapter(ch) {
  let html = `<div class="chapter active" id="ch${ch.id}">
    <h2>第 ${ch.id} 章 ${ch.title}</h2>
    <p class="subtitle">${ch.subtitle}</p>`;

  // Sections
  ch.sections.forEach(sec => {
    html += `<div class="card"><h3>${sec.title}</h3>${sec.content}</div>`;
  });

  // Exercises
  html += `<div class="card"><h3>📝 练习巩固</h3>`;
  ch.exercises.forEach((ex, i) => {
    html += `<div class="exercise" id="ex-${ch.id}-${i}">
      <h4>练习 ${i+1}: ${ex.question}</h4>
      <div class="q">`;
    if (ex.type === 'mc') {
      html += `<div class="opts" role="radiogroup" aria-label="练习 ${i+1} 选项">`;
      ex.options.forEach((opt, oi) => {
        html += `<label><input type="radio" name="q-${ch.id}-${i}" value="${oi}"> ${String.fromCharCode(65+oi)}. ${opt}</label>`;
      });
      html += `</div>`;
    } else {
      html += `<label for="ta-${ch.id}-${i}" class="sr-only">练习 ${i+1} 答案</label>`;
      html += `<textarea rows="3" id="ta-${ch.id}-${i}" placeholder="输入你的答案..."></textarea>`;
    }
    html += `<div style="margin-top:12px;display:flex;gap:8px;">
      <button class="btn btn-primary" onclick="checkAnswer(${ch.id}, ${i})">检查答案</button>
      <button class="btn btn-outline" onclick="showHint(${ch.id}, ${i})">查看提示</button>
    </div>
    <div class="feedback" id="fb-${ch.id}-${i}" role="alert" aria-live="polite"></div>
    </div></div>`;
  });
  html += `</div>`;

  // Chapter nav
  html += `<div class="chapter-nav">`;
  if (ch.id > 1) {
    html += `<button class="btn btn-outline" onclick="navigateTo(${ch.id - 1})">← 上一章</button>`;
  } else {
    html += `<span></span>`;
  }
  html += `<button class="btn btn-primary" onclick="completeChapter(${ch.id})">
    ${completedChapters.has(ch.id) ? '✅ 已完成 (点击取消)' : '✓ 标记完成'}
  </button>`;
  if (ch.id < chapters.length) {
    html += `<button class="btn btn-outline" onclick="navigateTo(${ch.id + 1})">下一章 →</button>`;
  } else {
    html += `<span></span>`;
  }
  html += `</div></div>`;
  return html;
}

function navigateTo(chId) {
  currentChapter = chId;
  mainContent.innerHTML = renderChapter(chapters[chId - 1]);
  renderSidebar();
  saveState();
  // All math rendered via katex-inline / katex classes below
  document.querySelectorAll('.katex-inline').forEach(el => {
    try { katex.render(el.getAttribute('data-expr'), el, {throwOnError: false}); }
    catch(e) { console.warn('KaTeX inline render failed:', el.getAttribute('data-expr'), e); el.textContent = '[公式错误]'; }
  });
  document.querySelectorAll('.katex').forEach(el => {
    if (!el.hasAttribute('data-expr')) return;
    try { katex.render(el.getAttribute('data-expr'), el, {displayMode: true, throwOnError: false}); }
    catch(e) { console.warn('KaTeX display render failed:', el.getAttribute('data-expr'), e); el.textContent = '[公式错误]'; }
  });
  window.scrollTo({top: 0, behavior: 'smooth'});
  // Close sidebar on mobile
  document.getElementById('sidebar').classList.remove('open');
  // Move focus to chapter heading for screen readers
  setTimeout(() => {
    const h2 = mainContent.querySelector('h2');
    if (h2) { h2.setAttribute('tabindex', '-1'); h2.focus({preventScroll: true}); }
  }, 100);
}

function completeChapter(chId) {
  if (completedChapters.has(chId)) {
    completedChapters.delete(chId);
  } else {
    completedChapters.add(chId);
  }
  updateProgress();
  renderSidebar();
  saveState();
  navigateTo(chId);
}

function checkAnswer(chId, exIdx) {
  const ch = chapters[chId - 1];
  const ex = ch.exercises[exIdx];
  const fb = document.getElementById('fb-' + chId + '-' + exIdx);
  let userAnswer, isCorrect = false;

  if (ex.type === 'mc') {
    const selected = document.querySelector(`input[name="q-${chId}-${exIdx}"]:checked`);
    if (!selected) { fb.className = 'feedback incorrect show'; fb.textContent = '请先选择一个选项。'; return; }
    userAnswer = parseInt(selected.value);
    isCorrect = userAnswer === ex.answer;
  } else {
    const ta = document.getElementById('ta-' + chId + '-' + exIdx);
    userAnswer = ta.value.trim();
    if (!userAnswer) { fb.className = 'feedback incorrect show'; fb.textContent = '请输入你的答案。'; return; }
    // For text answers, do case-insensitive substring matching
    const expected = ex.answer.toLowerCase().replace(/\s+/g, ' ').trim();
    const actual = userAnswer.toLowerCase().replace(/\s+/g, ' ').trim();
    if (expected.length <= 10) {
      // Short numeric answers: require exact match after normalization
      isCorrect = actual === expected;
    } else {
      // Long text answers: require the key phrase (first ~30 chars) to be present
      const keyPhrase = expected.substring(0, Math.min(30, expected.length));
      isCorrect = actual.includes(keyPhrase);
    }
  }

  fb.className = 'feedback show ' + (isCorrect ? 'correct' : 'incorrect');
  fb.innerHTML = isCorrect
    ? '✅ 正确！' + (ex.explanation ? '<br><small>' + ex.explanation + '</small>' : '')
    : '❌ 不正确。' + (ex.explanation ? '<br><small>' + ex.explanation + '</small>' : '');
}

function showHint(chId, exIdx) {
  const ch = chapters[chId - 1];
  const ex = ch.exercises[exIdx];
  const fb = document.getElementById('fb-' + chId + '-' + exIdx);
  fb.className = 'feedback show';
  fb.innerHTML = '💡 <strong>提示:</strong><br>' + (ex.explanation || '请仔细阅读本章内容，答案就在其中。');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ==================== THEME ====================
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('theme-icon').textContent = isDark ? '🌙' : '☀️';
  document.getElementById('theme-label').textContent = isDark ? '暗色模式' : '浅色模式';
  localStorage.setItem('llm-course-theme', isDark ? 'light' : 'dark');
}

function initTheme() {
  const saved = localStorage.getItem('llm-course-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  if (saved === 'dark') {
    document.getElementById('theme-icon').textContent = '☀️';
    document.getElementById('theme-label').textContent = '浅色模式';
  }
}

// ==================== BACK TO TOP ====================
function initBackToTop() {
  const btn = document.getElementById('back-to-top');
  window.addEventListener('scroll', () => {
    btn.classList.toggle('visible', window.scrollY > 400);
  });
}

// ==================== KEYBOARD NAV ====================
function initKeyboardNav() {
  document.addEventListener('keydown', (e) => {
    const tag = e.target.tagName;
    const isEditing = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || e.target.isContentEditable || e.target.getAttribute('role') === 'textbox';
    if (isEditing) return;

    if (e.key === 'Escape') {
      document.getElementById('sidebar').classList.remove('open');
      return;
    }
    if (e.key === 'ArrowLeft' && currentChapter > 1) {
      e.preventDefault();
      navigateTo(currentChapter - 1);
    } else if (e.key === 'ArrowRight' && currentChapter < chapters.length) {
      e.preventDefault();
      navigateTo(currentChapter + 1);
    }
  });
}

// ==================== RESET ====================
function resetProgress() {
  if (confirm('确定要重置所有学习进度吗？此操作不可撤销。')) {
    completedChapters.clear();
    currentChapter = 1;
    saveState();
    updateProgress();
    navigateTo(1);
  }
}

// ==================== SEARCH ====================
function buildSearchIndex() {
  const index = [];
  chapters.forEach(ch => {
    ch.sections.forEach(sec => {
      const text = sec.content.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
      index.push({ chId: ch.id, chTitle: ch.title, secTitle: sec.title, text: text });
    });
  });
  return index;
}
const searchIndex = buildSearchIndex();

function handleSearch(query) {
  const results = document.getElementById('search-results');
  if (!query || query.length < 2) { results.style.display = 'none'; results.innerHTML = ''; return; }
  const q = query.toLowerCase();
  const matches = [];
  searchIndex.forEach(item => {
    const haystack = (item.chTitle + ' ' + item.secTitle + ' ' + item.text).toLowerCase();
    const idx = haystack.indexOf(q);
    if (idx >= 0) {
      const start = Math.max(0, idx - 15);
      const snippet = haystack.substring(start, idx + q.length + 40);
      matches.push({ ...item, snippet: (start > 0 ? '...' : '') + snippet + '...' });
    }
  });
  if (matches.length === 0) {
    results.innerHTML = '<div style="padding:8px;opacity:.6;">未找到匹配内容</div>';
  } else {
    results.innerHTML = matches.slice(0, 8).map(m =>
      `<div style="padding:6px 8px;margin:2px 0;border-radius:4px;cursor:pointer;transition:all .15s;"
            onmouseover="this.style.background='rgba(255,255,255,.08)'"
            onmouseout="this.style.background='transparent'"
            onclick="navigateTo(${m.chId});document.getElementById('search-box').value='';document.getElementById('search-results').style.display='none';">
         <span style="color:var(--primary);font-weight:600;">Ch${m.chId}: ${m.secTitle}</span><br>
         <span style="opacity:.7;font-size:.7rem;">${m.snippet}</span>
       </div>`
    ).join('');
  }
  results.style.display = 'block';
}

// ==================== INIT ====================
updateProgress();
renderSidebar();
navigateTo(currentChapter);
initTheme();
initBackToTop();
initKeyboardNav();
</script>
