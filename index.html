<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon.png">
  <link rel="apple-touch-icon" href="images/favicon.png">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LLM Deep Learning — Building Large Language Models from Code</title>
<meta name="description" content="A systematic LLM course for training and inference engineers: from tokens, Transformers, training loops, alignment to inference serving, embedding essential foundations into every chapter.">
<link rel="stylesheet" href="css/style.css">
</head>
<body data-ch="0">

<button class="menu-toggle" aria-label="Menu">☰</button>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>LLM Deep Learning</h1>
    <p>Building Large Language Models from Code</p>
  </div>
  <nav class="sidebar-nav" id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <button class="theme-toggle" onclick="LLM.toggleTheme()" aria-label="Toggle theme">
      <span id="theme-icon">🌙</span> <span id="theme-label">Dark Mode</span>
    </button>
  </div>
</aside>

<main class="main">
  <section class="hero">
    <div class="hero-copy">
      <h2>LLM Deep Learning</h2>
      <p>A code-first, systems-oriented course for training and inference engineers: build, train, align, serve, and evaluate modern large language models end to end.</p>
      <div class="hero-actions">
        <a href="chapters/ch01.html" class="btn btn-primary">Start Learning →</a>
        <a href="#chapters" class="btn btn-outline">View Chapters</a>
      </div>
    </div>
  </section>

  <section class="course-index" id="chapters">
    <h3>Chapter Index</h3>
    <div class="chapter-list" id="chapter-list"></div>
  </section>
</main>

<script src="js/app.js"></script>
<script>
(function(){
  var chapters = window.LLM && LLM.getChapters ? LLM.getChapters() : [];
  function safeGet(k,d){
    try{
      var v = localStorage.getItem(k);
      if(v === null){
        v = localStorage.getItem('__idb_' + k);
        if(v !== null) localStorage.setItem(k, v);
      }
      return v ? JSON.parse(v) : d;
    } catch(e){ return d }
  }
  var done = new Set(safeGet('llm-done',[]));
  var list = document.getElementById('chapter-list');
  list.innerHTML = chapters.map(function(ch){
    var isDone = done.has(ch.id);
    return '<a href="'+ch.file+'" class="chapter-item'+(isDone?' completed':'')+'">'+
      '<span class="ch-num-big">'+(isDone?'✓':ch.id)+'</span>'+
      '<span class="ch-info"><h4>Chapter '+ch.id+' '+ch.title+'</h4></span>'+
      '<span class="ch-meta">'+ch.sections+' sections</span></a>';
  }).join('');
})();
</script>
</body>
</html>
