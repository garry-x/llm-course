<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 730" fill="none">
  <defs>
    <style>
      text{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
      .bg{fill:#fbf9f5}
      .panel{fill:#fff;stroke:#d4cec4;stroke-width:1.5}
      .panel-hot{fill:#fdf5ed;stroke:#b35c22;stroke-width:2}
      .grid{stroke:#e7dfd5;stroke-width:1}
      .axis{stroke:#d4cec4;stroke-width:1.2}
      .main{stroke:#b35c22;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
      .rot{stroke:#b35c22;stroke-width:1.6;stroke-dasharray:4 4;fill:none}
      .guide{stroke:#9e968a;stroke-width:1.2;stroke-dasharray:5 4;fill:none}
      .title{fill:#1c1c1c;font-size:18px;font-weight:750}
      .h{fill:#1c1c1c;font-size:15px;font-weight:750}
      .body{fill:#5c554a;font-size:12.5px}
      .muted{fill:#8a8176;font-size:11.5px}
      .code{fill:#b35c22;font-size:12.5px;font-family:"JetBrains Mono","Fira Code",Consolas,monospace}
      .code-dark{fill:#5c554a;font-size:12px;font-family:"JetBrains Mono","Fira Code",Consolas,monospace}
      .chip{fill:#f7efe6;stroke:#e1cbb8;stroke-width:1}
      .hot{fill:#b35c22}
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#b35c22"/>
    </marker>
  </defs>

  <rect class="bg" width="1100" height="730"/>
  <text class="title" x="550" y="34" text-anchor="middle">RoPE Rotary Position Encoding: Geometry, Formula, and Engineering Use</text>

  <!-- Geometry panel -->
  <rect class="panel" x="32" y="58" width="330" height="278" rx="4"/>
  <text class="h" x="197" y="86" text-anchor="middle">1. Rotate Each Q/K Dimension Pair</text>
  <text class="body" x="197" y="112" text-anchor="middle">For every pair (x_0, x_1), position m</text>
  <text class="body" x="197" y="130" text-anchor="middle">applies a 2D rotation angle m * theta_i.</text>

  <line class="axis" x1="72" y1="245" x2="322" y2="245"/>
  <line class="axis" x1="197" y1="145" x2="197" y2="292"/>
  <line class="main" x1="197" y1="245" x2="292" y2="176"/>
  <path class="rot" d="M 260 218 A 72 72 0 0 0 302 188"/>
  <text class="code" x="266" y="220">m * theta_i</text>
  <text class="h" x="297" y="172">(q0, q1)</text>

  <g transform="translate(72,300)">
    <line class="guide" x1="0" y1="0" x2="250" y2="0"/>
    <text class="muted" x="0" y="14" text-anchor="middle">i=0</text>
    <text class="muted" x="125" y="14" text-anchor="middle">i=32</text>
    <text class="muted" x="250" y="14" text-anchor="middle">i=63</text>
  </g>
  <text class="muted" x="197" y="329" text-anchor="middle">low frequency -> long range; high frequency -> short range</text>

  <!-- Formula panel -->
  <rect class="panel-hot" x="386" y="58" width="330" height="278" rx="4"/>
  <text class="h" x="551" y="86" text-anchor="middle">2. Dot Product Becomes Relative</text>
  <rect class="chip" x="418" y="111" width="266" height="64" rx="4"/>
  <text class="code" x="551" y="137" text-anchor="middle">(R_m q)^T (R_n k)</text>
  <text class="code" x="551" y="159" text-anchor="middle">= q^T R_(n-m) k</text>
  <text class="body" x="418" y="202">The attention score depends on distance</text>
  <text class="body" x="418" y="220">between positions, not only absolute IDs.</text>
  <text class="body" x="418" y="252">RoPE is applied to Q and K before</text>
  <text class="body" x="418" y="270">attention logits are computed.</text>
  <text class="body" x="418" y="302">Values V are not rotated because they carry</text>
  <text class="body" x="418" y="320">the content that attention reads out.</text>

  <!-- Engineering panel -->
  <rect class="panel" x="740" y="58" width="328" height="278" rx="4"/>
  <text class="h" x="904" y="86" text-anchor="middle">3. What Engineers Must Track</text>
  <text class="body" x="765" y="118">Norm preservation</text>
  <text class="muted" x="765" y="136">Rotation keeps vector length stable.</text>
  <text class="code" x="765" y="156">||R q|| = ||q||</text>

  <text class="body" x="765" y="193">Context extension</text>
  <text class="muted" x="765" y="211">RoPE scaling changes the frequency map.</text>
  <text class="muted" x="765" y="229">It still needs quality evaluation.</text>

  <text class="body" x="765" y="266">KV cache positions</text>
  <text class="muted" x="765" y="284">Incremental decoding must continue</text>
  <text class="muted" x="765" y="302">position IDs consistently.</text>

  <!-- Implementation panel -->
  <rect class="panel" x="32" y="364" width="1036" height="142" rx="4"/>
  <text class="h" x="550" y="392" text-anchor="middle">Implementation Sketch</text>
  <g>
    <text class="code" x="58" y="424">def apply_rope(q, k, pos):</text>
    <text class="code-dark" x="82" y="448">freqs  = 1.0 / (10000 ** (torch.arange(0, d, 2) / d))</text>
    <text class="code-dark" x="82" y="470">angles = pos[:, None] * freqs[None, :]</text>
    <text class="code-dark" x="82" y="492">q_rot  = q * cos(angles) + rotate_half(q) * sin(angles)</text>
  </g>
  <g>
    <text class="muted" x="678" y="448">Frequency is per paired channel.</text>
    <text class="muted" x="678" y="470">Position IDs must match cached tokens.</text>
    <text class="muted" x="678" y="492">The same operation is applied to K.</text>
  </g>

  <!-- Comparison table -->
  <rect class="panel" x="32" y="534" width="1036" height="176" rx="4"/>
  <text class="h" x="550" y="562" text-anchor="middle">Position Encoding Scheme Comparison</text>

  <line class="grid" x1="58" y1="582" x2="1042" y2="582"/>
  <line class="grid" x1="58" y1="612" x2="1042" y2="612"/>
  <line class="grid" x1="58" y1="642" x2="1042" y2="642"/>
  <line class="grid" x1="58" y1="672" x2="1042" y2="672"/>
  <line class="grid" x1="210" y1="582" x2="210" y2="672"/>
  <line class="grid" x1="542" y1="582" x2="542" y2="672"/>

  <text class="body" x="76" y="602" font-weight="750">Scheme</text>
  <text class="body" x="232" y="602" font-weight="750">Mechanism</text>
  <text class="body" x="564" y="602" font-weight="750">Engineering Note</text>

  <text class="body" x="76" y="632" font-weight="700">Sinusoidal</text>
  <text class="body" x="232" y="632">Add fixed position vector to token embedding.</text>
  <text class="muted" x="564" y="632">Simple and deterministic, less common in modern decoder-only LLMs.</text>

  <text class="body" x="76" y="662" font-weight="700">Learned PE</text>
  <text class="body" x="232" y="662">Learn absolute position embeddings.</text>
  <text class="muted" x="564" y="662">Good in-distribution; extrapolation requires care.</text>

  <text class="body hot" x="76" y="692" font-weight="750">RoPE</text>
  <text class="body hot" x="232" y="692">Rotate Q/K pairs before attention scoring.</text>
  <text class="muted" x="564" y="692">Widely used by Llama, Qwen, Mistral, and DeepSeek-style models.</text>
</svg>
