<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body data-ch="0">

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>LLM 深度学习</h1>
    <p>从代码出发，构建大语言模型</p>
  </div>
  <div class="sidebar-progress">
    <span>学习进度: <strong id="progress-text">0 / 10</strong></span>
    <div class="bar"><div class="bar-fill" id="progress-bar" style="width:0%"></div></div>
  </div>
  <nav class="sidebar-nav" id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <button class="theme-toggle" onclick="LLM.toggleTheme()" aria-label="切换主题">
      <span id="theme-icon">🌙</span> <span id="theme-label">暗色模式</span>
    </button>
  </div>
</aside>

<main class="main">
  <section class="hero">
    <div class="hero-tags">
      <span class="hero-tag">🐍 可运行 Python 代码</span>
      <span class="hero-tag">🧪 每章 5 道练习</span>
      <span class="hero-tag">🤖 融入 DeepSeek V2–V4</span>
      <span class="hero-tag">📱 iPad Pro 优化</span>
    </div>
    <h2>从代码出发，构建大语言模型</h2>
    <p>10 章 · 118 小节 · 50 道练习<br>从 BPE Tokenizer 到 GRPO 推理对齐，每一行代码都值得自己敲一遍。</p>
    <a href="chapters/ch01.html" class="btn btn-primary">开始学习 →</a>
  </section>

  <div class="dashboard" id="dashboard">
    <div class="dash-card">
      <div class="dash-icon">📚</div>
      <div class="num" id="dash-completed">—</div>
      <div class="label">已完成章节</div>
    </div>
    <div class="dash-card">
      <div class="dash-icon">📊</div>
      <div class="num" id="dash-progress">—</div>
      <div class="label">总体进度</div>
    </div>
    <div class="dash-card">
      <div class="dash-icon">⏱️</div>
      <div class="num">~9h</div>
      <div class="label">预计学习时间</div>
    </div>
    <div class="dash-card">
      <div class="dash-icon">🎯</div>
      <div class="num">50 道</div>
      <div class="label">交互练习</div>
    </div>
  </div>

  <div class="chapter-list" id="chapter-list"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script src="js/app.js"></script>
<script>
(function(){
  var chapters = [
    {id:1,file:'chapters/ch01.html',title:'环境搭建与分词',desc:'实现BPE Tokenizer——从字符到子词',sections:10},
    {id:2,file:'chapters/ch02.html',title:'嵌入层与位置编码',desc:'TokenEmbedding + RoPE——让模型理解语义与顺序',sections:9},
    {id:3,file:'chapters/ch03.html',title:'单头自注意力',desc:'Scaled Dot-Product Attention——LLM的核心计算',sections:10},
    {id:4,file:'chapters/ch04.html',title:'多头注意力与MLA',desc:'MHA→GQA→DeepSeek MLA——KV Cache压缩之路',sections:9},
    {id:5,file:'chapters/ch05.html',title:'Transformer Block',desc:'RMSNorm+FFN+SwiGLU+mHC超连接',sections:10},
    {id:6,file:'chapters/ch06.html',title:'组装完整GPT模型',desc:'GPT-2 124M + DeepSeekMoE架构',sections:10},
    {id:7,file:'chapters/ch07.html',title:'训练循环',desc:'AdamW/Muon+FP8/FP4+DualPipe——极致训练效率',sections:14},
    {id:8,file:'chapters/ch08.html',title:'文本生成',desc:'采样策略+MTP推测解码——让模型开口说话',sections:11},
    {id:9,file:'chapters/ch09.html',title:'微调与对齐',desc:'SFT/LoRA/DPO/GRPO——从预训练到有用助手',sections:12},
    {id:10,file:'chapters/ch10.html',title:'推理优化与前沿',desc:'KV Cache/CSA+HCA/量化/RAG/Agent——LLM的工程落地',sections:14}
  ];

  function safeGet(k,d){ try{var v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d} }
  var done = new Set(safeGet('llm-done',[]));
  var completed = done.size;
  var pct = Math.round(completed/10*100);

  document.getElementById('dash-completed').textContent = completed;
  document.getElementById('dash-progress').textContent = pct+'%';

  var list = document.getElementById('chapter-list');
  list.innerHTML = chapters.map(function(ch){
    var isDone = done.has(ch.id);
    return '<a href="'+ch.file+'" class="chapter-item'+(isDone?' completed':'')+'">'+
      '<span class="ch-num-big">'+(isDone?'✓':ch.id)+'</span>'+
      '<span class="ch-info"><h4>第'+ch.id+'章 '+ch.title+'</h4><p>'+ch.desc+'</p></span>'+
      '<span class="ch-meta">'+ch.sections+' 小节</span></a>';
  }).join('');
})();
</script>
</body>
</html>
