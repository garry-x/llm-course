<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" fill="none">
  <defs>
    <style>
      text { font-family: system-ui, sans-serif; }
      .bg { fill: #fbf9f5; }
      .box { fill: #fff; stroke: #d4cec4; stroke-width: 1.5; rx: 8; }
      .box-accent { fill: #fdf5ed; stroke: #b35c22; stroke-width: 2; rx: 8; }
      .box-dark { fill: #1e1d1a; stroke: #9e968a; stroke-width: 1.5; rx: 8; }
      .arrow { stroke: #b35c22; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-gray { stroke: #9e968a; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead-gray); stroke-dasharray: 4 3; }
      .label { fill: #5c554a; font-size: 13px; text-anchor: middle; }
      .label-sm { fill: #9e968a; font-size: 11px; text-anchor: middle; }
      .title { fill: #1c1c1c; font-size: 16px; font-weight: 700; text-anchor: middle; }
      .code { fill: #b35c22; font-size: 11px; font-family: monospace; text-anchor: middle; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #1a1814; }
        .box { fill: #24221d; stroke: #504a40; }
        .box-accent { fill: #2a2018; stroke: #e08940; }
        .box-dark { fill: #141310; stroke: #8a8278; }
        .label { fill: #a09888; }
        .label-sm { fill: #8a8278; }
        .title { fill: #ede8df; }
        .code { fill: #e08940; }
        .arrow { stroke: #e08940; }
      }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#b35c22"/>
    </marker>
    <marker id="arrowhead-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9e968a"/>
    </marker>
  </defs>
  <rect class="bg" width="800" height="900"/>

  <!-- Input -->
  <rect class="box" x="250" y="20" width="300" height="40"/>
  <text class="title" x="400" y="46">Input Token IDs [batch, seq_len]</text>

  <!-- Token Embedding -->
  <line class="arrow" x1="400" y1="60" x2="400" y2="85"/>
  <rect class="box" x="250" y="85" width="300" height="38"/>
  <text class="label" x="400" y="108">Token Embedding (nn.Embedding)</text>
  <text class="label-sm" x="400" y="130">vocab_size × d_model</text>

  <!-- Positional Encoding -->
  <line class="arrow" x1="400" y1="123" x2="400" y2="145"/>
  <rect class="box-accent" x="250" y="145" width="300" height="38"/>
  <text class="label" x="400" y="168">+ RoPE Positional Encoding</text>

  <!-- Transformer Block xN -->
  <line class="arrow" x1="400" y1="183" x2="400" y2="205"/>
  <rect class="box" x="200" y="205" width="400" height="280"/>
  <text class="title" x="400" y="228">Transformer Block × L (12~96 layers)</text>

  <!-- MHA inside block -->
  <rect class="box" x="240" y="245" width="320" height="55"/>
  <text class="label" x="400" y="268">Masked Multi-Head Self-Attention</text>
  <text class="code" x="400" y="288">Q=X·W_Q  K=X·W_K  V=X·W_V</text>

  <line class="arrow" x1="400" y1="300" x2="400" y2="315"/>
  <text class="label-sm" x="410" y="310">+ Residual + LayerNorm/RMSNorm</text>

  <!-- FFN inside block -->
  <rect class="box" x="240" y="330" width="320" height="55"/>
  <text class="label" x="400" y="353">Feed-Forward Network (FFN)</text>
  <text class="code" x="400" y="373">SwiGLU(x·W₁) · (x·W_g) → W₂</text>

  <line class="arrow" x1="400" y1="385" x2="400" y2="400"/>
  <text class="label-sm" x="410" y="395">+ Residual + LayerNorm/RMSNorm</text>

  <text class="label-sm" x="400" y="495">↑ 每个 Block 独立参数，残差连接保证梯度流畅 ↑</text>

  <!-- Final LayerNorm -->
  <line class="arrow" x1="400" y1="485" x2="400" y2="510"/>
  <rect class="box" x="250" y="510" width="300" height="38"/>
  <text class="label" x="400" y="533">Final RMSNorm</text>

  <!-- LM Head -->
  <line class="arrow" x1="400" y1="548" x2="400" y2="575"/>
  <rect class="box-accent" x="250" y="575" width="300" height="38"/>
  <text class="label" x="400" y="598">LM Head (d_model → vocab_size)</text>

  <!-- Softmax -->
  <line class="arrow" x1="400" y1="613" x2="400" y2="640"/>
  <rect class="box-dark" x="250" y="640" width="300" height="38"/>
  <text class="label" x="400" y="663" style="fill:#e8e4dc">Softmax → Token Probabilities</text>

  <!-- Output -->
  <line class="arrow" x1="400" y1="678" x2="400" y2="705"/>
  <text class="title" x="400" y="725">P(next_token | previous_tokens)</text>
  <text class="label-sm" x="400" y="745">自回归生成: 逐 token 采样，拼回输入继续生成</text>

  <!-- Side annotations -->
  <rect class="box" x="640" y="208" width="140" height="50"/>
  <text class="label" x="710" y="230">GPT-2 Small: L=12</text>
  <text class="label-sm" x="710" y="248">d_model=768</text>

  <rect class="box" x="640" y="270" width="140" height="50"/>
  <text class="label" x="710" y="292">Llama 3 70B: L=80</text>
  <text class="label-sm" x="710" y="310">d_model=8192</text>

  <rect class="box" x="640" y="332" width="140" height="50"/>
  <text class="label" x="710" y="354">DeepSeek-V3: L=61</text>
  <text class="label-sm" x="710" y="372">d_model=7168, MoE</text>
</svg>
