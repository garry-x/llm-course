<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" fill="none">
  <defs>
    <style>
      text{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
      .bg{fill:#fbf9f5}
      .panel{fill:#fff;stroke:#d4cec4;stroke-width:1.3}
      .panel-accent{fill:#fdf5ed;stroke:#b35c22;stroke-width:1.6}
      .title{fill:#1c1c1c;font-size:22px;font-weight:750}
      .h{fill:#1c1c1c;font-size:15px;font-weight:750}
      .body{fill:#5c554a;font-size:13px}
      .small{fill:#7a7166;font-size:11.5px}
      .mono{fill:#5c554a;font-size:11.4px;font-family:"JetBrains Mono","Fira Code",monospace;font-weight:600}
      .accent{fill:#b35c22;font-weight:750}
      .bar-embed{fill:#b35c22;opacity:.72}
      .bar-block{fill:#7baaf7;opacity:.72}
      .bar-pos{fill:#81c995;opacity:.72}
      .bar-small{fill:#e08940;opacity:.72}
      .rule{stroke:#e8e3da;stroke-width:1}
    </style>
  </defs>

  <rect class="bg" width="1000" height="700"/>
  <text class="title" x="500" y="36" text-anchor="middle">GPT-2 Small (124M) Parameter Ledger</text>
  <text class="body" x="500" y="60" text-anchor="middle">Configuration: vocab=50,257 · max_seq_len=1,024 · d_model=768 · layers=12 · heads=12 · d_ff=3,072</text>

  <rect class="panel-accent" x="32" y="84" width="936" height="92" rx="10"/>
  <text class="h" x="58" y="116">Total trainable parameters</text>
  <text class="title accent" x="58" y="150">124,439,808</text>
  <text class="body" x="288" y="120">Includes linear biases and LayerNorm scale/bias terms.</text>
  <text class="body" x="288" y="146">With weight tying, the LM head reuses token embeddings; no extra 38.6M output matrix.</text>

  <rect class="panel" x="32" y="202" width="936" height="214" rx="10"/>
  <text class="h" x="58" y="232">Component contribution</text>

  <rect class="bar-embed" x="58" y="252" width="246" height="24" rx="4"/>
  <text class="h" x="336" y="270">Token embedding</text>
  <text class="mono" x="560" y="270">50,257 x 768 = 38,597,376</text>
  <text class="body" x="930" y="270" text-anchor="end">31.02%</text>

  <rect class="bar-pos" x="58" y="288" width="6" height="24" rx="3"/>
  <text class="h" x="336" y="306">Position embedding</text>
  <text class="mono" x="560" y="306">1,024 x 768 = 786,432</text>
  <text class="body" x="930" y="306" text-anchor="end">0.63%</text>

  <rect class="bar-block" x="58" y="324" width="542" height="24" rx="4"/>
  <text class="h" x="622" y="337">Transformer blocks x 12</text>
  <text class="mono" x="622" y="362">12 x 7,087,872 = 85,054,464</text>
  <text class="body" x="930" y="337" text-anchor="end">68.36%</text>

  <rect class="bar-small" x="58" y="372" width="3" height="24" rx="3"/>
  <text class="h" x="336" y="390">Final LayerNorm + tied LM head</text>
  <text class="mono" x="620" y="390">1,536 + 0</text>
  <text class="body" x="930" y="390" text-anchor="end">~0.00%</text>

  <rect class="panel" x="32" y="440" width="452" height="214" rx="10"/>
  <text class="h" x="58" y="470">One Transformer block</text>
  <line class="rule" x1="58" y1="484" x2="458" y2="484"/>
  <text class="body" x="58" y="506">Attention QKV projection</text>
  <text class="mono" x="78" y="524">768 x 2304 + 2304 = 1,771,776</text>
  <text class="body" x="58" y="548">Attention output projection</text>
  <text class="mono" x="78" y="566">768 x 768 + 768 = 590,592</text>
  <text class="body" x="58" y="590">MLP expansion projection</text>
  <text class="mono" x="78" y="608">768 x 3072 + 3072 = 2,362,368</text>
  <text class="body" x="58" y="628">MLP output + LayerNorm terms</text>
  <text class="mono" x="78" y="646">2,360,064 + 3,072</text>
  <text class="h accent" x="282" y="646">Block total: 7,087,872</text>

  <rect class="panel" x="516" y="440" width="452" height="210" rx="10"/>
  <text class="h" x="542" y="470">How to read the ledger</text>
  <line class="rule" x1="542" y1="484" x2="942" y2="484"/>
  <text class="body" x="542" y="512">1. Embedding size is controlled by vocabulary and hidden width.</text>
  <text class="small" x="562" y="534">Large for GPT-2 small because vocab=50,257 while d=768.</text>
  <text class="body" x="542" y="564">2. Blocks dominate once depth and FFN width increase.</text>
  <text class="small" x="562" y="586">Each block contains attention, MLP, and LayerNorm parameters.</text>
  <text class="body" x="542" y="616">3. Weight tying changes accounting, not the logits shape.</text>
  <text class="small" x="562" y="638">The model still returns [B, T, vocab_size].</text>

  <text class="small" x="500" y="680" text-anchor="middle">Figure 6-1: layer-by-layer parameter accounting for the GPT-2 small implementation target.</text>
</svg>
